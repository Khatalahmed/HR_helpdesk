name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy "pyright[nodejs]"

      - name: Ruff
        run: python -m ruff check app tests test_api.py test_models.py

      - name: Mypy
        run: python -m mypy app tests test_api.py test_models.py --ignore-missing-imports --follow-imports=skip

      - name: Pyright
        run: python -m pyright -p .

      - name: Pytest
        run: python -m pytest tests -q

      - name: RAG Quality Gate
        if: ${{ hashFiles('rag_evaluation_summary.json') != '' }}
        run: |
          python scripts/check_quality_gate.py \
            --summary rag_evaluation_summary.json \
            --faithfulness 0.90 \
            --answer-relevancy 0.70 \
            --context-precision 0.70 \
            --context-recall 0.85
